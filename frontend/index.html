<!DOCTYPE html>
<html lang="pt-br">

        </footer>
        <script src="js/typewriter.js"></script>
        <script>
            function login() {
                window.location.src = "pages/login.html";

            }

                window.location.src = "pages/sign.html";
            }
        </script>
